<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bibliojocs - Directorio de juegos educativos</title>
  <meta name="description" content="Directorio de juegos educativos en castellano y valenciano. Gestionado como sitio estatico para facilitar mantenimiento y deteccion de enlaces rotos." />
  <meta name="robots" content="index,follow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Bibliojocs - Directorio de juegos educativos" />
  <meta property="og:description" content="Recopilacion de juegos educativos online organizada por etapas e idioma." />
  <meta property="og:url" content="https://bibliojocs.edutictac.es/" />
  <meta name="twitter:card" content="summary" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles/site.css" />
</head>
<body>
  <div class="bg-orb orb-left" aria-hidden="true"></div>
  <div class="bg-orb orb-right" aria-hidden="true"></div>

  <header class="hero">
    <p class="eyebrow">Edutictac</p>
    <h1>Bibliojocs</h1>
    <p class="subtitle">Directorio de juegos educativos, mantenido sin WordPress para poder depurar y validar enlaces con rapidez.</p>
  </header>

  <main class="container">
    <section class="controls" aria-label="Filtros de juegos">
      <label>
        Buscar
        <input id="searchInput" type="search" placeholder="Titulo, area o notas" />
      </label>

      <label>
        Etapa
        <select id="levelFilter">
          <option value="">Todas</option>
        </select>
      </label>

      <label>
        Idioma
        <select id="languageFilter">
          <option value="">Todos</option>
        </select>
      </label>

      <label class="check-wrap">
        <input id="brokenOnly" type="checkbox" />
        Mostrar solo enlaces con incidencia
      </label>
    </section>

    <section class="status-strip" id="statusStrip" aria-live="polite">
      Cargando estado de enlaces...
    </section>

    <section>
      <div class="results-head">
        <h2>Juegos</h2>
        <p id="resultCount"></p>
      </div>
      <div id="grid" class="grid" aria-live="polite"></div>
      <p id="emptyState" class="empty hidden">No hay resultados con los filtros actuales.</p>
    </section>
  </main>

  <footer class="footer">
    <p>Gestion: archivo <code>data/games.json</code> + comprobador automatico de enlaces.</p>
  </footer>

  <script type="module" src="./scripts/app.js"></script>
</body>
</html>
