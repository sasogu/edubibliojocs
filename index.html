<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bibliojocs - Directorio de juegos educativos</title>
  <meta name="description" content="Directorio de juegos educativos en castellano y valenciano. Gestionado como sitio estatico para facilitar mantenimiento y deteccion de enlaces rotos." />
  <meta name="robots" content="index,follow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Bibliojocs - Directorio de juegos educativos" />
  <meta property="og:description" content="Recopilacion de juegos educativos online organizada por etapas e idioma." />
  <meta property="og:url" content="https://bibliojocs.edutictac.es/" />
  <meta name="twitter:card" content="summary" />
  <meta name="theme-color" content="#22577a" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/brand/icon-192.png" />
  <link rel="apple-touch-icon" href="./assets/brand/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles/site.css" />
</head>
<body>
  <div class="bg-orb orb-left" aria-hidden="true"></div>
  <div class="bg-orb orb-right" aria-hidden="true"></div>

  <header class="hero">
    <p class="eyebrow">Edutictac</p>
    <h1 class="brand-title">
      <img class="brand-logo" src="./assets/brand/logo-bibliojocs.png" alt="Logo de Bibliojocs" width="72" height="72" />
      <span>Bibliojocs</span>
    </h1>
    <p class="subtitle" data-i18n="subtitle">Directorio de juegos educativos, mantenido sin WordPress para poder depurar y validar enlaces con rapidez.</p>
    <div class="lang-switcher" role="group" aria-label="Idioma de la interfaz / Idioma de la interfície">
      <button class="btn-lang" data-lang="es">ES</button>
      <button class="btn-lang" data-lang="ca">CA</button>
    </div>
  </header>

  <main class="container">
    <section class="controls" aria-label="Filtros de juegos">
      <label>
        <span data-i18n="search_label">Buscar</span>
        <input id="searchInput" type="search" placeholder="Título, área o notas" data-i18n-placeholder="search_placeholder" />
      </label>

      <label>
        <span data-i18n="level_label">Etapa</span>
        <select id="levelFilter">
          <option value="" data-i18n="level_all">Todas</option>
        </select>
      </label>

      <label>
        <span data-i18n="language_label">Idioma</span>
        <select id="languageFilter">
          <option value="" data-i18n="language_all">Todos</option>
        </select>
      </label>

      <label>
        <span data-i18n="area_label">Materia</span>
        <select id="areaFilter">
          <option value="" data-i18n="area_all">Todas</option>
        </select>
      </label>

      <label class="check-wrap">
        <input id="brokenOnly" type="checkbox" />
        <span data-i18n="broken_only">Solo enlaces con incidencia</span>
      </label>
    </section>

    <section class="status-strip" id="statusStrip" aria-live="polite">
      Cargando estado de enlaces...
    </section>

    <section>
      <div class="results-head">
        <h2 data-i18n="section_title">Juegos</h2>
        <p id="resultCount"></p>
      </div>
      <div id="grid" class="grid" aria-live="polite"></div>
      <p id="emptyState" class="empty hidden" data-i18n="empty">No hay resultados con los filtros actuales.</p>
    </section>
  </main>

  <footer class="footer">
    <p>Gestion: archivo <code>data/games.json</code> + comprobador automatico de enlaces.</p>
  </footer>

  <dialog id="flashDialog" class="flash-dialog" data-i18n-aria-label="flash_player_label" aria-label="Reproductor Flash">
    <div class="flash-header">
      <span id="flashTitle" class="flash-title"></span>
      <div class="flash-actions">
        <button id="flashFullscreen" class="flash-fullscreen" aria-label="Pantalla completa" title="Pantalla completa">⛶</button>
        <button id="flashClose" class="flash-close" data-i18n-aria-label="flash_close_label" aria-label="Cerrar">✕</button>
      </div>
    </div>
    <div id="flashContainer" class="flash-container"></div>
  </dialog>

  <script type="module" src="./scripts/app.js"></script>
</body>
</html>
